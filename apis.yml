aid: crunchbase-data
url: https://raw.githubusercontent.com/api-evangelist/crunchbase-data/refs/heads/main/apis.yml
name: Crunchbase
kind: company
description: >-
  Crunchbase is a leading source of private and public company, funding, and
  investor data - firmographics, funding rounds, acquisitions, investors,
  people, and events across the global startup and business landscape. The
  Crunchbase Data API (REST v4, base https://api.crunchbase.com/v4/data)
  exposes this graph programmatically through four surfaces - Entity Lookup,
  Search, Autocomplete, and Deleted Entities (deltas) - for web intelligence,
  reference data, market research, sales and investment prospecting, and
  enrichment use cases. It is a read-only RESTful service authenticated with an
  API key (user_key query parameter or X-cb-user-key header). Access is
  subscription-gated: the full API requires a Crunchbase Enterprise or
  Applications license, with a reduced Basic API available to Crunchbase Basic
  plan holders.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Company Data
- Web Intelligence
- Funding Data
- Firmographics
- B2B Data
- Investor Data
- Reference Data
- Fortune 1000
created: '2026-07-11'
modified: '2026-07-11'
specificationVersion: '0.19'
apis:
- aid: crunchbase-data:crunchbase-data-entity-lookup-api
  name: Crunchbase Entity Lookup API
  tags:
  - Company Data
  - Firmographics
  - Reference Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://data.crunchbase.com/docs/using-entity-lookup-apis
  baseURL: https://api.crunchbase.com/v4/data
  properties:
  - url: https://data.crunchbase.com/docs/using-entity-lookup-apis
    type: Documentation
  - url: https://data.crunchbase.com/docs/using-the-api
    type: APIReference
  - url: openapi/crunchbase-data-openapi.yml
    type: OpenAPI
  - url: collections/crunchbase-data.postman_collection.json
    type: PostmanCollection
  - url: collections/crunchbase-data.opencollection.json
    type: OpenCollection
  description: >-
    Retrieve a single entity from a core collection - organizations, people,
    funding_rounds, acquisitions, and more - by UUID or permalink, selecting
    fields with field_ids and related data with card_ids. GET
    /entities/{collection}/{entity_id} plus a card endpoint for paging past the
    100-item inline card limit. Ideal for firmographic enrichment and company
    reference-data lookups.
- aid: crunchbase-data:crunchbase-data-search-api
  name: Crunchbase Search API
  tags:
  - Web Intelligence
  - Funding Data
  - B2B Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://data.crunchbase.com/docs/using-search-apis
  baseURL: https://api.crunchbase.com/v4/data
  properties:
  - url: https://data.crunchbase.com/docs/using-search-apis
    type: Documentation
  - url: https://data.crunchbase.com/docs/examples-search-api
    type: Documentation
  - url: openapi/crunchbase-data-openapi.yml
    type: OpenAPI
  - url: collections/crunchbase-data.postman_collection.json
    type: PostmanCollection
  - url: collections/crunchbase-data.opencollection.json
    type: OpenCollection
  description: >-
    Query a collection (organizations, people, funding_rounds, acquisitions,
    and others) with a JSON body of field_ids and AND-combined query predicates.
    POST /searches/{collection} returns 50 items by default and up to 1000 per
    request, with keyset pagination via after_id / before_id. The workhorse for
    building targeted company lists, funding-data feeds, and web-intelligence
    datasets.
- aid: crunchbase-data:crunchbase-data-autocomplete-api
  name: Crunchbase Autocomplete API
  tags:
  - Autocomplete
  - Company Data
  - Reference Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://data.crunchbase.com/docs/using-autocomplete-api
  baseURL: https://api.crunchbase.com/v4/data
  properties:
  - url: https://data.crunchbase.com/docs/using-autocomplete-api
    type: Documentation
  - url: https://data.crunchbase.com/docs/examples-autocomplete-api
    type: Documentation
  - url: openapi/crunchbase-data-openapi.yml
    type: OpenAPI
  - url: collections/crunchbase-data.postman_collection.json
    type: PostmanCollection
  - url: collections/crunchbase-data.opencollection.json
    type: OpenCollection
  description: >-
    Resolve a query string to matching entity identifiers, optionally scoped to
    collections such as organization.companies, principal.investors, or
    categories. GET /autocompletes (limit up to 25) is typically used to obtain
    the UUIDs or permalinks that feed downstream Search and Entity Lookup calls.
- aid: crunchbase-data:crunchbase-data-deleted-entities-api
  name: Crunchbase Deleted Entities API
  tags:
  - Deltas
  - Data Sync
  - Reference Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://data.crunchbase.com/docs/using-deleted-entities-api
  baseURL: https://api.crunchbase.com/v4/data
  properties:
  - url: https://data.crunchbase.com/docs/using-deleted-entities-api
    type: Documentation
  - url: openapi/crunchbase-data-openapi.yml
    type: OpenAPI
  - url: collections/crunchbase-data.postman_collection.json
    type: PostmanCollection
  - url: collections/crunchbase-data.opencollection.json
    type: OpenCollection
  description: >-
    Detect entities removed from the Crunchbase Graph (compliance, data-quality
    cleanup, inappropriate content) so consumers can reconcile their own
    databases - the delta / change-detection surface. GET /deleted_entities and
    GET /deleted_entities/{collection_id} with collection_ids filtering,
    deleted_at_order sorting, and after_id / before_id keyset pagination.
