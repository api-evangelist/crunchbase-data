meters:
- name: license_tier
  description: The contracted license (Enterprise, Applications, or Basic) that gates API scope and included volume.
  unit: contract
  aggregation: max
  dimensions:
  - account
- name: api_calls
  description: API calls made against the Data API, bounded by 200 calls/minute and the license's contracted allowance.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - endpoint
- name: data_export
  description: Volume / frequency of data exported under the license; a factor in enterprise pricing.
  unit: records
  aggregation: sum
  dimensions:
  - account
  - collection
principles:
- name: Visibility
  description: Track API call volume against the 200/minute cap and the contracted allowance; monitor which collections and endpoints drive usage.
- name: Allocation
  description: Attribute the license fee and call volume to the teams and products consuming Crunchbase data (sales, research, enrichment).
- name: Optimization
  description: Use Autocomplete to resolve identifiers before expensive Search calls, select only needed field_ids, and poll Deleted Entities incrementally instead of re-fetching the whole graph.
- name: Accountability
  description: Assign a license owner, review call volume against contract terms before renewal, and right-size the license tier to actual usage.
