description: >-
  FinOps view of Crunchbase Data API spend. Crunchbase data is licensed, not
  metered on a public per-call rate: cost is driven by the license tier
  (Enterprise, Applications, or Basic) negotiated by contract, with enterprise
  agreements quoted on user count, API call volume, data-export frequency, and
  term. The dominant cost lever is the license itself rather than incremental
  API usage, though call volume and export frequency influence the negotiated
  price. There is no free full-API tier.
notes: >-
  Per-license fees are not published and are set by contract; enterprise
  data-licensing has historically started in the tens of thousands of dollars
  per year. Reconcile actual contract terms, included call volume, and any
  overage or export charges with Crunchbase.
