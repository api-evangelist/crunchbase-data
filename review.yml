aid: crunchbase-data
name: Crunchbase
review:
  question: Does Crunchbase expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. The Crunchbase Data API (REST v4) is a
    read-only, request/response RESTful service over HTTPS. There is no
    server-push transport (WebSocket or SSE) documented on the Crunchbase API.
    Near-real-time change detection is offered by polling the Deleted Entities
    (deltas) REST endpoints, not by a streaming transport, so there is nothing
    to model as an AsyncAPI channel.
findings:
  summary: |
    Crunchbase does not publish a documented public WebSocket API. The
    Crunchbase Data API v4 (base https://api.crunchbase.com/v4/data) is a
    read-only RESTful service over HTTPS. It exposes four surfaces - Entity
    Lookup (GET /entities/{collection}/{entity_id}), Search
    (POST /searches/{collection}), Autocomplete (GET /autocompletes), and
    Deleted Entities / deltas (GET /deleted_entities and
    /deleted_entities/{collection_id}). Authentication is an API key passed as
    the user_key query parameter or the X-cb-user-key header. All calls must be
    HTTPS (non-HTTPS returns 426) and are capped at 200 calls per minute. No
    realtime, bidirectional, or streaming WebSocket (ws:// or wss://) endpoint
    is documented anywhere in the Crunchbase developer documentation.
  accessModel: |
    Full API access is subscription-gated and requires a Crunchbase Enterprise
    or Applications license; a reduced Basic API is available to Crunchbase
    Basic plan holders. There is no free self-serve full-API tier. Endpoint
    paths, methods, auth, and rate limits below are confirmed from public docs;
    field-level request/response schemas in the OpenAPI are honestly modeled
    from the documentation because live responses are license-gated
    (endpointsModeled applies to schemas, not paths).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.crunchbase.com/v4/data
      documented: true
      note: Read-only RESTful Data API v4. All four surfaces are request/response over HTTPS.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the Crunchbase Data API as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events surface is documented; change detection is via polling the Deleted Entities REST endpoints.
  endpointsConfirmedRest:
    - GET  https://api.crunchbase.com/v4/data/entities/{collection}/{entity_id}
    - GET  https://api.crunchbase.com/v4/data/entities/{collection}/{entity_id}/cards/{card_id}
    - POST https://api.crunchbase.com/v4/data/searches/{collection}
    - GET  https://api.crunchbase.com/v4/data/autocompletes
    - GET  https://api.crunchbase.com/v4/data/deleted_entities
    - GET  https://api.crunchbase.com/v4/data/deleted_entities/{collection_id}
  collections:
    - organizations
    - people
    - funding_rounds
    - acquisitions
    - investments
    - events
sources:
  - url: https://data.crunchbase.com/docs/using-the-api
    type: Documentation
    note: Base URL, API-key auth (user_key query param / X-cb-user-key header), 200 calls/min rate limit, HTTPS-required (426), four API categories.
  - url: https://data.crunchbase.com/docs/using-entity-lookup-apis
    type: APIReference
    note: GET /entities/{collection}/{entity_id} with field_ids and card_ids; cards capped at 100 items inline.
  - url: https://data.crunchbase.com/docs/using-search-apis
    type: APIReference
    note: POST /searches/{collection}; 50 default / 1000 max; AND-only query predicates; keyset pagination.
  - url: https://data.crunchbase.com/docs/using-autocomplete-api
    type: APIReference
    note: GET /autocompletes with query, collection_ids, limit (max 25).
  - url: https://data.crunchbase.com/docs/using-deleted-entities-api
    type: APIReference
    note: GET /deleted_entities and /deleted_entities/{collection_id} with collection_ids, deleted_at_order, after_id/before_id.
  - url: https://about.crunchbase.com/products/crunchbase-api/
    type: Documentation
    note: Product page; access requires Enterprise or Applications license (Basic API for Basic plan holders).
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists on the Crunchbase Data API. The
    entire public API is read-only request/response REST over HTTPS, so no
    AsyncAPI document was created. An OpenAPI 3.0 document was authored for the
    four documented REST surfaces, with field-level schemas modeled from the
    docs because live responses are gated behind a paid license.
